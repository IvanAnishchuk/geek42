name: Bug report
description: Report something that isn't working correctly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        **Do not report security vulnerabilities here.** See
        [SECURITY.md](../SECURITY.md) for the private disclosure
        channel.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Steps or a minimal example that triggers the bug
      placeholder: |
        1. Run `geek42 ...`
        2. Observe ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: geek42 version
      placeholder: "0.2.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.13.2"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Gentoo / amd64 / kernel 6.6.12"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: text
