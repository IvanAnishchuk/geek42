name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Deny-all default — each job opts in to what it needs.
permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Common reports directory structure. All jobs write their outputs
# under .reports/<category>/ so nothing clutters the repo root.
env:
  REPORTS_DIR: .reports

jobs:
  # ================================================================
  # pre-commit — runs the full hook suite for CI/local parity
  # ================================================================
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@91182cccc01eb5e619899d80e4e971d6181294a7 # v2.10.1
        with:
          egress-policy: audit

      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@4db96194c378173c656ce18a155ffc14a9fc4355 # v4.2.0
        with:
          enable-cache: true

      - run: uv sync --frozen --dev

      - name: Cache pre-commit environments
        uses: actions/cache@0c907a75c2c80ebcb7f088228285e798b750cf8f # v4.2.1
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit on all files
        run: uv run pre-commit run --all-files --show-diff-on-failure
        env:
          SKIP: no-commit-to-branch

  # ================================================================
  # lint — ruff (style + security) with SARIF upload, text log, and
  # JSON output. SARIF is uploaded to the Security tab so findings
  # appear inline in PR review as code-scanning annotations.
  # ================================================================
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write  # upload SARIF to code scanning
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@91182cccc01eb5e619899d80e4e971d6181294a7 # v2.10.1
        with:
          egress-policy: audit

      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@4db96194c378173c656ce18a155ffc14a9fc4355 # v4.2.0
        with:
          enable-cache: true

      - run: uv sync --frozen --dev

      - name: Prepare reports directory
        run: mkdir -p "${REPORTS_DIR}/lint"

      - name: Ruff check (full suite, SARIF)
        run: |
          set +e
          uv run ruff check --output-format=sarif \
            --output-file="${REPORTS_DIR}/lint/ruff.sarif" src/ tests/
          echo "ruff_exit=$?" >> "$GITHUB_ENV"
          uv run ruff check --output-format=github src/ tests/ \
            | tee "${REPORTS_DIR}/lint/ruff.log" || true
        continue-on-error: true

      - name: Ruff check (JSON report)
        run: |
          uv run ruff check --output-format=json \
            --output-file="${REPORTS_DIR}/lint/ruff.json" src/ tests/ || true

      - name: Ruff format check
        run: |
          uv run ruff format --check --diff src/ tests/ \
            | tee "${REPORTS_DIR}/lint/ruff-format.log" || true

      - name: Write lint summary
        if: always()
        run: |
          {
            echo "## Lint report"
            echo ""
            if [ -s "${REPORTS_DIR}/lint/ruff.json" ]; then
              count=$(jq length "${REPORTS_DIR}/lint/ruff.json")
              echo "**ruff** found **$count** issue(s)"
            else
              echo "**ruff**: clean ✅"
            fi
            echo ""
            echo "<details><summary>Ruff output</summary>"
            echo ""
            echo '```'
            head -100 "${REPORTS_DIR}/lint/ruff.log" 2>/dev/null || echo "no output"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Ruff SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@4fa2a7953630fd2f3fb380f21be14ede0169dd4f # v3.27.5
        with:
          sarif_file: .reports/lint/ruff.sarif
          category: ruff

      - name: Upload lint logs
        if: always()
        uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          name: lint-logs
          path: .reports/lint/
          retention-days: 14

      - name: Fail if ruff found issues
        run: |
          if [ "${ruff_exit:-0}" != "0" ]; then
            echo "Ruff reported issues — see logs above."
            exit 1
          fi

  # ================================================================
  # security-lint — runs ONLY the security rule groups (S, BLE, TRY)
  # so security findings are tracked separately from style. SARIF
  # uploaded under its own category.
  # ================================================================
  security-lint:
    name: Security lint (S rules)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@91182cccc01eb5e619899d80e4e971d6181294a7 # v2.10.1
        with:
          egress-policy: audit

      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@4db96194c378173c656ce18a155ffc14a9fc4355 # v4.2.0
        with:
          enable-cache: true

      - run: uv sync --frozen --dev

      - name: Prepare reports directory
        run: mkdir -p "${REPORTS_DIR}/security-lint"

      - name: Ruff security-only scan (SARIF)
        run: |
          uv run ruff check \
            --select S,BLE,TRY \
            --extend-ignore S404,TRY003 \
            --output-format=sarif \
            --output-file="${REPORTS_DIR}/security-lint/ruff-security.sarif" \
            src/ \
            || true

      - name: Ruff security-only scan (JSON)
        run: |
          uv run ruff check \
            --select S,BLE,TRY \
            --extend-ignore S404,TRY003 \
            --output-format=json \
            --output-file="${REPORTS_DIR}/security-lint/ruff-security.json" \
            src/ \
            || true

      - name: Ruff security-only scan (text log)
        run: |
          uv run ruff check \
            --select S,BLE,TRY \
            --extend-ignore S404,TRY003 \
            --output-format=full \
            src/ 2>&1 | tee "${REPORTS_DIR}/security-lint/ruff-security.log" || true

      - name: Write security summary
        if: always()
        run: |
          {
            echo "## Security lint report"
            echo ""
            if [ -s "${REPORTS_DIR}/security-lint/ruff-security.json" ]; then
              count=$(jq 'length' "${REPORTS_DIR}/security-lint/ruff-security.json")
              if [ "$count" = "0" ]; then
                echo "**ruff S/BLE/TRY**: clean ✅"
              else
                by_code=$(jq -r 'group_by(.code) | map("\(.[0].code): \(length)") | join(", ")' "${REPORTS_DIR}/security-lint/ruff-security.json")
                echo "**ruff S/BLE/TRY**: **$count** finding(s)"
                echo ""
                echo "Breakdown: $by_code"
              fi
            else
              echo "**ruff S/BLE/TRY**: clean ✅"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload security SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@4fa2a7953630fd2f3fb380f21be14ede0169dd4f # v3.27.5
        with:
          sarif_file: .reports/security-lint/ruff-security.sarif
          category: ruff-security

      - name: Upload security lint logs
        if: always()
        uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          name: security-lint-logs
          path: .reports/security-lint/
          retention-days: 30  # longer retention for audit trail

  # ================================================================
  # typecheck — ty with log artifact
  # ================================================================
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@91182cccc01eb5e619899d80e4e971d6181294a7 # v2.10.1
        with:
          egress-policy: audit

      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@4db96194c378173c656ce18a155ffc14a9fc4355 # v4.2.0
        with:
          enable-cache: true

      - run: uv sync --frozen --dev

      - name: Prepare reports directory
        run: mkdir -p "${REPORTS_DIR}/typecheck"

      - name: ty check
        run: uv run ty check 2>&1 | tee "${REPORTS_DIR}/typecheck/ty.log"

      - name: Upload ty log
        if: always()
        uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          name: typecheck-log
          path: .reports/typecheck/
          retention-days: 14

  # ================================================================
  # audit — dependency provenance:
  #   - Verify uv.lock in sync with pyproject.toml
  #   - Verify committed requirements.txt & requirements-dev.txt
  #     match uv.lock (fail if stale — developer must regen + commit)
  #   - Run scripts/audit.py for pip-audit + SBOMs on both variants
  # ================================================================
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@91182cccc01eb5e619899d80e4e971d6181294a7 # v2.10.1
        with:
          egress-policy: audit

      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@4db96194c378173c656ce18a155ffc14a9fc4355 # v4.2.0
        with:
          enable-cache: true

      - run: uv sync --frozen --dev

      - name: Run supply-chain audit script
        id: audit_script
        run: uv run python scripts/audit.py
        continue-on-error: true

      - name: Copy committed requirements into reports dir
        if: always()
        run: |
          mkdir -p "${REPORTS_DIR}/audit"
          cp requirements.txt "${REPORTS_DIR}/audit/requirements.txt"
          cp requirements-dev.txt "${REPORTS_DIR}/audit/requirements-dev.txt"

      - name: Write audit summary
        if: always()
        run: |
          {
            echo "## Dependency audit"
            echo ""
            echo "| Check | Result |"
            echo "|---|---|"
            if [ "${{ steps.audit_script.outcome }}" = "success" ]; then
              echo "| Supply-chain audit | ✅ passed |"
            else
              echo "| Supply-chain audit | ❌ failed — see logs |"
            fi
            if [ -f "${REPORTS_DIR}/audit/sbom.cdx.json" ]; then
              components=$(jq '.components | length' "${REPORTS_DIR}/audit/sbom.cdx.json")
              echo "| SBOM (prod) components | $components |"
            fi
            if [ -f "${REPORTS_DIR}/audit/sbom-dev.cdx.json" ]; then
              components=$(jq '.components | length' "${REPORTS_DIR}/audit/sbom-dev.cdx.json")
              echo "| SBOM (prod + dev) components | $components |"
            fi
            echo ""
            if [ -s "${REPORTS_DIR}/audit/pip-audit.log" ]; then
              echo "<details><summary>pip-audit (prod) output</summary>"
              echo ""
              echo '```'
              cat "${REPORTS_DIR}/audit/pip-audit.log"
              echo '```'
              echo "</details>"
            fi
            if [ -s "${REPORTS_DIR}/audit/pip-audit-dev.log" ]; then
              echo ""
              echo "<details><summary>pip-audit (prod + dev) output</summary>"
              echo ""
              echo '```'
              cat "${REPORTS_DIR}/audit/pip-audit-dev.log"
              echo '```'
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          name: dependency-audit
          path: |
            .reports/audit/
            requirements.txt
            requirements-dev.txt
          retention-days: 90  # SBOM retained for compliance window

      - name: Fail if audit script reported errors
        if: steps.audit_script.outcome != 'success'
        run: |
          echo "Supply-chain audit failed — see logs above and artifacts."
          exit 1

  # ================================================================
  # osv-scan — Google's OSV vulnerability scanner as a second
  # opinion on top of pip-audit. Uploads SARIF to code scanning.
  # ================================================================
  osv-scan:
    name: OSV scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@91182cccc01eb5e619899d80e4e971d6181294a7 # v2.10.1
        with:
          egress-policy: audit

      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          persist-credentials: false

      - name: Prepare reports directory
        run: mkdir -p "${REPORTS_DIR}/osv"

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@eb5b619bb565d10623076caba5263750fde3c790 # main 2026-04-10
        with:
          scan-args: |-
            --output=.reports/osv/osv-results.sarif
            --format=sarif
            --recursive
            ./
        continue-on-error: true

      - name: Upload OSV SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@4fa2a7953630fd2f3fb380f21be14ede0169dd4f # v3.27.5
        with:
          sarif_file: .reports/osv/osv-results.sarif
          category: osv-scanner

      - name: Upload OSV report
        if: always()
        uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          name: osv-scan-report
          path: .reports/osv/
          retention-days: 30

  # ================================================================
  # test — pytest with JUnit XML, coverage XML, HTML report.
  # Test results are published as PR annotations; coverage is
  # commented on PRs and a shields.io badge is updated on main.
  # ================================================================
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # coverage, etc
      pull-requests: write  # coverage + test-report comments
      checks: write         # publish test result check
      issues: write         # test reporter creates a check
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@91182cccc01eb5e619899d80e4e971d6181294a7 # v2.10.1
        with:
          egress-policy: audit

      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@4db96194c378173c656ce18a155ffc14a9fc4355 # v4.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - run: uv sync --frozen --dev

      - name: Run pytest with JUnit + coverage XML
        id: pytest
        run: |
          mkdir -p "${REPORTS_DIR}/test"
          set +e
          uv run pytest tests/ -v 2>&1 | tee "${REPORTS_DIR}/test/pytest.log"
          echo "exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Write test summary
        if: always()
        run: |
          {
            echo "## Test results (Python ${{ matrix.python-version }})"
            echo ""
            if [ -f "${REPORTS_DIR}/test/test-results.xml" ]; then
              total=$(grep -oP 'tests="\K[0-9]+' "${REPORTS_DIR}/test/test-results.xml" | head -1)
              failures=$(grep -oP 'failures="\K[0-9]+' "${REPORTS_DIR}/test/test-results.xml" | head -1)
              errors=$(grep -oP 'errors="\K[0-9]+' "${REPORTS_DIR}/test/test-results.xml" | head -1)
              skipped=$(grep -oP 'skipped="\K[0-9]+' "${REPORTS_DIR}/test/test-results.xml" | head -1)
              passed=$((total - failures - errors - skipped))
              echo "| Total | Passed | Failed | Errors | Skipped |"
              echo "|---|---|---|---|---|"
              echo "| $total | $passed | $failures | $errors | $skipped |"
            fi
            echo ""
            if [ -f "${REPORTS_DIR}/test/coverage.xml" ]; then
              line_rate=$(grep -oP 'line-rate="\K[0-9.]+' "${REPORTS_DIR}/test/coverage.xml" | head -1)
              branch_rate=$(grep -oP 'branch-rate="\K[0-9.]+' "${REPORTS_DIR}/test/coverage.xml" | head -1)
              line_pct=$(awk "BEGIN {printf \"%.2f\", $line_rate * 100}")
              branch_pct=$(awk "BEGIN {printf \"%.2f\", $branch_rate * 100}")
              echo "### Coverage"
              echo ""
              echo "- Lines: **${line_pct}%**"
              echo "- Branches: **${branch_pct}%**"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish test results (PR annotations)
        if: always() && github.event_name == 'pull_request'
        uses: EnricoMi/publish-unit-test-result-action@82082dac68ad6a19d980f8ce817e108b9f496c2a # v2.17.1
        with:
          files: .reports/test/test-results.xml
          check_name: "Pytest report (${{ matrix.python-version }})"
          comment_mode: always
          compare_to_earlier_commit: true

      - name: Coverage comment + badge (PR + main)
        if: matrix.python-version == '3.13'
        uses: py-cov-action/python-coverage-comment-action@7188638f871f721a365d644f505d1ff3df20d683 # v3.40
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERAGE_DATA_BRANCH: python-coverage-comment-action-data
          MINIMUM_GREEN: 90
          MINIMUM_ORANGE: 75

      - name: Upload test + coverage artifacts
        if: always()
        uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          name: test-results-${{ matrix.python-version }}
          path: .reports/test/
          retention-days: 14

      - name: Fail if tests did not pass
        if: steps.pytest.outputs.exit != '0'
        run: |
          echo "pytest reported failures — see test-results artifact and PR check."
          exit 1
