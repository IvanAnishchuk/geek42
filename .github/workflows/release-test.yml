name: Release Test

on:
  push:
    tags: ["v0.0.*", "v0.1.*"]

permissions: {}

jobs:
  build:
    name: Build + sign
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - name: Build
        run: uv build && ls -la dist/

      - name: Sign with sigstore
        uses: sigstore/gh-action-sigstore-python@v3
        with:
          inputs: ./dist/geek42-*.whl ./dist/geek42-*.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-dist
          path: dist/
