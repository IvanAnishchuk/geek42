name: Release Test

on:
  push:
    tags: ["v0.0.*", "v0.1.*"]

permissions: {}

jobs:
  build:
    name: Build + sign + attest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - name: Build
        run: uv build && ls -la dist/

      - name: Generate SBOM
        run: |
          uv export --format requirements-txt --no-emit-project > requirements-release.txt
          uv tool run --from cyclonedx-bom cyclonedx-py requirements requirements-release.txt \
            --output-format json \
            --output-file dist/geek42-sbom.cdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/geek42-*.whl,dist/geek42-*.tar.gz"

      - name: Attest SBOM
        uses: actions/attest-sbom@v1
        with:
          subject-path: "dist/geek42-*.whl"
          sbom-path: "dist/geek42-sbom.cdx.json"

      - name: Sign with sigstore
        uses: sigstore/gh-action-sigstore-python@v3.3.0
        with:
          inputs: ./dist/geek42-*.whl ./dist/geek42-*.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-dist
          path: dist/

  # NOTE: SLSA provenance removed — causes startup_failure.
  # TODO: investigate slsa-framework/slsa-github-generator
  # reusable workflow requirements.

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/v0.1')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/geek42/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: test-dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
          verbose: true

  github-release:
    name: Create GitHub Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v0.1')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: test-dist
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/geek42-*.whl
            dist/geek42-*.tar.gz
            dist/geek42-sbom.cdx.json
            dist/*.sigstore
