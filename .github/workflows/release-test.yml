name: Release Test

on:
  push:
    tags: ["v0.0.*", "v0.1.*"]

permissions: {}

jobs:
  # Step 1: just build — no attestations, no SLSA, no publish
  build:
    name: Build only
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - name: Build sdist and wheel
        run: |
          uv build
          ls -la dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-dist
          path: dist/
