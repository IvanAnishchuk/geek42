name: Release Test

on:
  push:
    tags: ["v0.0.*", "v0.1.*"]

permissions: {}

jobs:
  build:
    name: Build + sign + attest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - name: Build
        run: uv build && ls -la dist/

      - name: Compute hashes
        id: hash
        run: |
          cd dist
          HASHES=$(sha256sum geek42-*.whl geek42-*.tar.gz | base64 -w0)
          echo "hashes=${HASHES}" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/geek42-*"

      - name: Sign with sigstore
        uses: sigstore/gh-action-sigstore-python@v3.3.0
        with:
          inputs: ./dist/geek42-*.whl ./dist/geek42-*.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-dist
          path: dist/

  provenance:
    name: SLSA L3 provenance
    needs: build
    permissions:
      contents: read
      id-token: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      upload-assets: false
      provenance-name: geek42-provenance.intoto.jsonl
