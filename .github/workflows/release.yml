name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      testpypi:
        description: "Publish to TestPyPI instead of PyPI"
        required: false
        default: false
        type: boolean

permissions: {}

jobs:
  # -------------------------------------------------------------------
  # Build wheel + sdist with reproducible settings, generate SBOM,
  # attest provenance, and sign with sigstore.
  # -------------------------------------------------------------------
  build:
    name: Build & attest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v4.2.0

      - name: Compute SOURCE_DATE_EPOCH from tag commit
        run: |
          echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct "${GITHUB_SHA}")" >> "$GITHUB_ENV"
          echo "PYTHONHASHSEED=0" >> "$GITHUB_ENV"

      - name: Build sdist and wheel
        run: |
          uv build
          ls -la dist/

      - name: Generate SBOM (CycloneDX)
        run: |
          uv export --format requirements-txt --no-emit-project > requirements-release.txt
          uv tool run --from cyclonedx-bom cyclonedx-py requirements requirements-release.txt \
            --output-format json \
            --output-file dist/geek42-sbom.cdx.json
          ls -la dist/

      - name: Compute artifact hashes
        id: hash
        run: |
          cd dist
          HASHES=$(sha256sum geek42-*.whl geek42-*.tar.gz | base64 -w0)
          echo "hashes=${HASHES}" >> "$GITHUB_OUTPUT"
          sha256sum geek42-*.whl geek42-*.tar.gz > SHA256SUMS.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "dist/geek42-*.whl,dist/geek42-*.tar.gz"

      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v1.4.1
        with:
          subject-path: "dist/geek42-*.whl"
          sbom-path: "dist/geek42-sbom.cdx.json"

      - name: Sign artifacts with sigstore
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
        with:
          inputs: ./dist/geek42-*.whl ./dist/geek42-*.tar.gz

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-dist
          path: |
            dist/
            requirements-release.txt
          retention-days: 7

  # -------------------------------------------------------------------
  # SLSA Level 3 provenance generator (reusable workflow).
  # TODO: temporarily disabled — causes startup_failure. Likely needs
  # additional repo-level permissions or configuration for the
  # slsa-framework reusable workflow. Re-enable once resolved.
  # See: https://github.com/slsa-framework/slsa-github-generator
  # -------------------------------------------------------------------
  # provenance:
  #   name: SLSA L3 provenance
  #   needs: build
  #   permissions:
  #     contents: read
  #     id-token: write
  #     actions: read
  #   uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
  #   with:
  #     base64-subjects: ${{ needs.build.outputs.hashes }}
  #     upload-assets: false
  #     provenance-name: geek42-provenance.intoto.jsonl

  # -------------------------------------------------------------------
  # Publish to PyPI via trusted publishing (OIDC, no password).
  # Protected by the `pypi` environment which requires manual approval.
  # -------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: >-
      github.event_name == 'push'
      && startsWith(github.ref, 'refs/tags/v')
      && !contains(github.ref_name, 'dev')
      && !contains(github.ref_name, 'rc')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/project/geek42/
    permissions:
      id-token: write      # OIDC for trusted publishing
      attestations: write  # PEP 740 publish attestations
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: release-dist/

      - name: Prepare dist/
        run: |
          mkdir -p dist
          cp release-dist/dist/geek42-*.whl release-dist/dist/geek42-*.tar.gz dist/
          ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          # No password / token — uses trusted publishing (OIDC)
          print-hash: true
          verbose: true

  # -------------------------------------------------------------------
  # Publish to TestPyPI when triggered manually with testpypi=true.
  # -------------------------------------------------------------------
  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.testpypi)
      || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
          && (contains(github.ref_name, 'dev') || contains(github.ref_name, 'rc')))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: testpypi
      url: https://test.pypi.org/project/geek42/
    permissions:
      id-token: write      # OIDC for trusted publishing
      attestations: write  # PEP 740 publish attestations
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: release-dist/

      - name: Prepare dist/
        run: |
          mkdir -p dist
          cp release-dist/dist/geek42-*.whl release-dist/dist/geek42-*.tar.gz dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          print-hash: true
          verbose: true

  # -------------------------------------------------------------------
  # Create GitHub Release with all artifacts (wheel, sdist, SBOM,
  # sigstore bundles).
  # -------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    needs: [build, publish-pypi, publish-testpypi]
    if: >-
      always()
      && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      && needs.build.result == 'success'
      && (needs.publish-pypi.result == 'success' || needs.publish-pypi.result == 'skipped')
      && (needs.publish-testpypi.result == 'success' || needs.publish-testpypi.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: release-dist/

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            /^## \[/ { if (p) exit; if ($0 ~ "\\[" ver "\\]") p=1; next }
            p { print }
          ' CHANGELOG.md > release-notes.md
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          name: "geek42 ${{ steps.notes.outputs.version }}"
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') || contains(github.ref_name, 'dev') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: |
            release-dist/dist/geek42-*.whl
            release-dist/dist/geek42-*.tar.gz
            release-dist/dist/geek42-sbom.cdx.json
            release-dist/dist/SHA256SUMS.txt
            release-dist/dist/*.sigstore
