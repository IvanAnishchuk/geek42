# Companion workflow for Dependabot uv PRs.
#
# Dependabot (uv ecosystem) updates pyproject.toml + uv.lock but cannot
# run post-update commands.  This workflow regenerates the derived
# requirements*.txt files and badge JSON files, then commits them back
# to the PR branch.
#
# Uses GITHUB_TOKEN to push.  If the pushed commit does not retrigger CI
# (a known GitHub limitation with GITHUB_TOKEN), switch to a GitHub App
# token or fine-grained PAT for the checkout/push steps.

name: "Dependabot: regenerate requirements and badges"

on:
  pull_request:
    paths:
      - pyproject.toml
      - uv.lock
    types: [opened, synchronize, reopened]

permissions: {}

concurrency:
  group: dependabot-regen-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  regen:
    name: Regenerate requirements and badges
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v4.2.0
        with:
          enable-cache: true

      - run: uv sync --frozen --dev

      - name: Export requirements from uv.lock
        run: |
          uv export --format requirements-txt --no-emit-project --no-dev \
            --output-file requirements.txt
          uv export --format requirements-txt --no-emit-project \
            --output-file requirements-dev.txt

      - name: Regenerate badge JSON files
        run: uv run python scripts/regen_badges.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet requirements.txt requirements-dev.txt badges/; then
            echo "Derived files are up to date — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add requirements.txt requirements-dev.txt badges/
          git commit -m "chore(deps): regenerate requirements and badges from uv.lock"
          git push
